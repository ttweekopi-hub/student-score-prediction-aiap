name: ML Pipeline CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate Mock Database
        run: python scripts/generate_test_data.py

      - name: Run Preprocessing
        run: python -m src.preprocessing

      - name: Train Model
        run: python -m src.train

      - name: Evaluate and Assert MAE
        run: |
          RESULTS=$(python -m src.evaluation)
          echo "$RESULTS"
          python -c "
          import re, sys
          text = '''$RESULTS'''
          match = re.search(r'MAE[:\s]+([0-9]+\.[0-9]+)', text)
          if not match:
              sys.exit(1)
          mae = float(match.group(1))
          if mae > 6.0:
              sys.exit(1)
          "

  deploy:
    needs: run-pipeline
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deployment
        run: |
          curl -f ${{ secrets.RENDER_DEPLOY_HOOK }}