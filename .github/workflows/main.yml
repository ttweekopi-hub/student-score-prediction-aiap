name: ML Pipeline CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate Mock Database
        run: python scripts/generate_test_data.py

      - name: Run Preprocessing
        run: python -m src.preprocessing

      - name: Train Model
        run: python -m src.train

      - name: Evaluate and Assert MAE
        run: |
          # 1. Force the shell to exit immediately if any command fails
          set -e 
          
          # 2. Run evaluation and capture output
          RESULTS=$(python -m src.evaluation)
          echo "--- Full Evaluation Output ---"
          echo "$RESULTS"
          echo "------------------------------"
          
          # 3. Export to environment variable for safe Python access
          export EVAL_TEXT="$RESULTS"
          
          # 4. Run the gatekeeper script
          python -c "
          import re, sys, os
          
          # Retrieve text safely from environment
          text = os.getenv('EVAL_TEXT', '')
          
          # Find the MAE value
          match = re.search(r'MAE[:\s]+([0-9]+\.[0-9]+)', text)
          
          if not match:
              print('❌ CRITICAL: Could not find MAE in the output!')
              sys.exit(1)
          
          mae = float(match.group(1))
          print(f'📊 Parsed MAE: {mae}')
          
          # Trigger failure if threshold is exceeded
          if mae > 6.0:
              print(f'❌ FAIL: MAE {mae} is above the 6.0 limit. DEPLOYMENT BLOCKED.')
              sys.exit(1)
          
          print(f'✅ PASS: MAE {mae} is acceptable. PROCEEDING TO DEPLOY.')
          "

  deploy:
    needs: run-pipeline
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deployment
        run: |
          curl -f ${{ secrets.RENDER_DEPLOY_HOOK }}